[package]
name = "rust-data-stream-processor"
version = "0.1.0"
edition = "2021"

[profile.release]
codegen-units = 1
lto = "fat"


[dependencies]
kafkas = { git = "https://github.com/iamazy/kafkas", branch = "main" }
futures = "0.3.30"
clap = { version = "4.5.9", features = ["derive"] }
bytes = "1.7.1"
indexmap = "2.4.0"
tokio = { version = "1.39.3", features = ["full"] }
serde = { version = "1.0.204", features = ["derive"] }
serde_json = "1.0.125"
chrono = "0.4.38"